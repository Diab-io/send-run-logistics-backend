services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: true
    depends_on:
      - redis
    volumes:
      - .:/app

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    env_file:
      - path: .env
        required: true
    depends_on:
      - redis
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"